<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Order Form</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            /* Extracted Color Palette Reference Tokens from image_cab4fc.png */
            --md-sys-color-bg: #e5f1f6; 
            --md-sys-color-surface: #ffffff;
            --md-sys-color-surface-variant: #cedee5;
            --md-sys-color-primary: #023047; /* Dark Navy Blue */
            --md-sys-color-primary-container: #8ecae6; /* Light Blue */
            --md-sys-color-on-primary-container: #011621;
            --md-sys-color-accent: #fb8500; /* Vibrant Orange */
            --md-sys-color-accent-container: #ffb703; /* Bright Yellow */
            --md-sys-color-error: #ba1a1a;
            --md-sys-color-error-container: #ffdad6;
            --md-sys-color-on-error-container: #410002;
            --md-sys-color-outline: #219ebc; /* Teal/Cyan */
            --md-sys-color-text: #023047;
            --md-sys-color-text-secondary: #219ebc;

            /* Profit Calculator Specific Colors mapped to Palette */
            --purchasing: #fff1cc; 
            --sales: #e5f6fc; 
            --profit: #ffe9d1; 
            --purchasing-text: #b27f00;
            --sales-text: #166b80;
            --profit-text: #b25e00;
            --discount: #fde8e4;
            --discount-text: #991b1b;
            
            /* High Contrast Custom Highlights */
            --rsp-highlight-text: #fb8500;
        }

        body { 
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: var(--md-sys-color-bg); 
            margin: 0; 
            padding: 8px; 
            color: var(--md-sys-color-text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
        }
        
        .container { max-width: 1440px; margin: 0 auto; }
        
        .header { 
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px; 
            background: var(--md-sys-color-surface); 
            padding: 10px 16px; 
            border-radius: 12px; 
            border: 1px solid var(--md-sys-color-surface-variant);
        }
        .header h2 { margin: 0; font-size: 1.1rem; color: var(--md-sys-color-primary); font-weight: 700; letter-spacing: -0.2px; }

        .btn-header-shortcut {
            background: var(--md-sys-color-primary);
            color: #ffffff;
            min-height: 36px !important;
            height: 36px;
            padding: 0 12px !important;
            font-size: 0.75rem !important;
        }

        .workspace-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .top-full, .bottom-full { width: 100%; }

        .card { 
            background: var(--md-sys-color-surface); 
            padding: 14px; 
            border-radius: 14px; 
            border: 1px solid var(--md-sys-color-surface-variant);
            box-sizing: border-box;
            height: 100%;
        }
        
        h3 { 
            margin-top: 0; 
            color: var(--md-sys-color-primary); 
            font-size: 0.8rem; 
            border-bottom: 1px solid var(--md-sys-color-surface-variant); 
            padding-bottom: 10px; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            display: flex; 
            flex-direction: column;
            gap: 6px;
            font-weight: 700;
        }

        .column-visibility-dropdown-container {
            position: relative;
            display: inline-block;
            width: 100%;
            flex: 1;
        }
        .dropdown-trigger-btn {
            width: 100%;
            height: 44px;
            background: var(--md-sys-color-surface);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 8px;
            padding: 0 12px;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--md-sys-color-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            box-sizing: border-box;
            white-space: nowrap;
        }
        .dropdown-trigger-btn::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 5px solid var(--md-sys-color-primary);
            margin-left: 6px;
        }
        .dropdown-menu-panel {
            display: none;
            position: absolute;
            top: 48px;
            right: 0;
            width: 200px;
            background: var(--md-sys-color-surface);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 8px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
            z-index: 110;
            padding: 6px 0;
            box-sizing: border-box;
        }
        .dropdown-menu-panel.show {
            display: block;
        }
        .dropdown-item-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--md-sys-color-primary);
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .dropdown-item-label:active {
            background-color: var(--md-sys-color-bg);
        }
        .dropdown-item-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--md-sys-color-primary);
            cursor: pointer;
            margin: 0;
        }

        .filter-search-wrapper {
            margin-bottom: 12px;
            width: 100%;
            position: relative;
            scroll-margin-top: 8px;
        }
        .filter-search-container {
            display: flex;
            align-items: center;
            position: relative;
            width: 100%;
        }
        .filter-search-container input[type="text"] {
            width: 100%;
            padding-right: 82px;
        }
        .btn-clear-search {
            position: absolute;
            right: 42px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            background: transparent;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--md-sys-color-primary);
            font-size: 1.1rem;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-clear-search:active {
            background: var(--md-sys-color-surface-variant);
        }
        .btn-scan-barcode {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-scan-barcode:active {
            background: var(--md-sys-color-surface-variant);
        }
        .btn-scan-barcode svg {
            width: 22px;
            height: 22px;
            fill: var(--md-sys-color-primary);
        }

        .tab-container {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--md-sys-color-surface-variant);
            padding-bottom: 0px;
            margin-bottom: 14px;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 14px; 
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--md-sys-color-primary);
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            -webkit-tap-highlight-color: transparent;
            flex: 1 0 auto;
            text-align: center;
            opacity: 0.7;
        }
        .tab-btn.active {
            color: var(--md-sys-color-primary);
            background: transparent;
            opacity: 1;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--md-sys-color-accent);
            border-radius: 3px 3px 0 0;
        }
        
        .form-grid { 
            display: flex;
            flex-direction: column; 
            gap: 12px; 
            width: 100%;
            padding-bottom: 4px;
        }

        .form-unit {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .form-group { width: 100%; display: flex; flex-direction: column; }
        
        label { 
            display: block; 
            font-size: 0.68rem; 
            font-weight: 700; 
            color: var(--md-sys-color-primary); 
            margin-bottom: 4px; 
            text-transform: uppercase; 
            letter-spacing: 0.04em;
        }
        
        input[type="text"], input[type="number"], select, textarea { 
            width: 100%; 
            padding: 10px 12px; 
            border: 1px solid var(--md-sys-color-outline); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 0.92rem; 
            background: var(--md-sys-color-surface); 
            color: var(--md-sys-color-primary);
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="text"], input[type="number"], select { height: 44px; }
        textarea { resize: vertical; padding: 12px; font-family: monospace; }
        
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23023047' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 14px;
            padding-right: 36px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--md-sys-color-outline);
            border-width: 2px;
            padding: 9px 11px;
        }

        .tab-panel {
            display: none;
            opacity: 0;
        }
        .tab-panel.active {
            display: block;
            opacity: 1;
        }

        .calc-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .calc-section {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--md-sys-color-surface-variant);
        }
        .calc-purchasing { background: var(--purchasing); }
        .calc-sales { background: var(--sales); }
        .calc-profit { background: var(--profit); border-color: #ffd6b3; }
        .calc-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .calc-row > div { flex: 1; }
        .net-cost { display: block; margin-top: 6px; font-size: 0.75rem; font-weight: 600; color: var(--discount-text); }
        .profit-amount { margin-top: 8px; font-size: 0.9rem; font-weight: 700; color: var(--profit-text); }
        .main-result { font-weight: 700; color: var(--sales-text); border-color: var(--md-sys-color-outline); }
        .margin-result { font-weight: 700; color: var(--profit-text); }

        /* Continuous Barcode Scanning UI Elements */
        .camera-btn {
            display: block;
            width: 100%;
            text-align: center;
            background-color: var(--md-sys-color-outline);
            color: white;
            padding: 14px 0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            box-sizing: border-box;
            margin-bottom: 12px;
            border: none;
            transition: background 0.2s;
        }
        .camera-btn:active { opacity: 0.85; }
        
        #scanStatus {
            text-align: center;
            font-weight: bold;
            margin-bottom: 12px;
            min-height: 20px;
            font-size: 0.85rem;
        }

        #toolkitLiveReader {
            width: 100%;
            max-width: 450px;
            margin: 0 auto 12px auto;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            display: none; 
            border: 2px solid var(--md-sys-color-outline);
        }

        #toolkitOutput {
            display: flex;
            flex-direction: row;
            align-items: center;
            overflow-x: auto;
            gap: 16px;
            padding: 8px 4px 16px 4px;
            -webkit-overflow-scrolling: touch;
        }
        
        .barcode-container {
            background: #fff;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--md-sys-color-surface-variant);
            text-align: center;
            flex: 0 0 auto;
            min-width: fit-content;
            box-sizing: border-box;
        }
        .barcode-error { color: var(--md-sys-color-error); font-size: 13px; font-weight: 500; }

        .order-tab-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--md-sys-color-surface-variant);
        }
        .order-tab-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--md-sys-color-primary);
        }

        .table-container, .inventory-table-container { 
            overflow-x: auto; 
            max-height: 420px; 
            overflow-y: auto; 
            border-radius: 10px;
            border: 1px solid var(--md-sys-color-surface-variant);
            -webkit-overflow-scrolling: touch;
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: auto; }
        
        th { 
            position: sticky; 
            top: 0; 
            background: var(--md-sys-color-bg); 
            text-align: left; 
            padding: 10px; 
            font-size: 0.7rem; 
            font-weight: 700;
            color: var(--md-sys-color-primary); 
            border-bottom: 2px solid var(--md-sys-color-surface-variant); 
            z-index: 10; 
            white-space: nowrap; 
        }
        td { padding: 10px; border-bottom: 1px solid var(--md-sys-color-surface-variant); font-size: 0.82rem; white-space: nowrap; height: 44px; box-sizing: border-box; }
        
        td.wrap-cell { white-space: normal; word-break: break-word; font-size: 0.8rem; line-height: 1.25; }

        .col-id, .col-barcode, .col-stock, .col-actions { display: none; }

        tfoot {
            position: sticky;
            bottom: 0;
            background: var(--md-sys-color-bg);
            font-size: 0.8rem;
            z-index: 10;
        }
        tfoot td {
            border-top: 2px solid var(--md-sys-color-surface-variant);
            padding: 10px;
        }
        .footer-metric-label { font-size: 0.68rem; text-transform: uppercase; color: var(--md-sys-color-primary); font-weight: bold; }
        .footer-metric-val { font-weight: 700; color: var(--md-sys-color-primary); font-family: monospace; font-size: 0.85rem; }
        .grand-total-row td { background: var(--md-sys-color-accent-container); border-top: 1px dashed var(--md-sys-color-outline); }
        .grand-total-row .footer-metric-val { color: var(--md-sys-color-primary); font-size: 0.95rem; }

        .btn { 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1); 
            padding: 10px 14px; 
            font-size: 0.8rem; 
            min-height: 44px; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { filter: brightness(0.85); transform: scale(0.98); }
        
        .btn-save { background: var(--md-sys-color-primary); color: white; width: 100%; height: 46px; font-size: 0.9rem; }
        .btn-plus { background: var(--md-sys-color-outline); color: white; width: 36px; height: 36px; min-height: 36px; padding: 0; font-size: 0.85rem; border-radius: 8px; }
        .btn-edit { background: #b45309; color: white; width: 36px; height: 36px; min-height: 36px; padding: 0; border-radius: 8px; }
        .btn-delete { background: var(--md-sys-color-error-container); color: var(--md-sys-color-error); width: 36px; height: 36px; min-height: 36px; padding: 0; border-radius: 8px; }
        .btn-excel { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-primary); }
        .btn-export-all { background: var(--md-sys-color-primary); color: white; }

        .qty-input { width: 64px !important; text-align: center; border: 1px solid var(--md-sys-color-outline) !important; font-weight: bold; height: 36px; padding: 4px; border-radius: 6px; font-size: 0.9rem; }

        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; flex-shrink: 0; }
        .dot-active { background-color: #16a34a; box-shadow: 0 0 4px #16a34a; }
        .dot-blocked { background-color: #dc2626; box-shadow: 0 0 4px #dc2626; }
        
        .action-cell { display: flex; gap: 6px; align-items: center; }
        .code-cell { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
        
        .inventory-head-flex { display: flex; flex-direction: column; width: 100%; gap: 10px; }
        .inventory-title-centered { text-align: center; font-weight: 700; font-size: 0.95rem; color: var(--md-sys-color-primary); }
        .header-controls-left, .header-controls-right { display: flex; gap: 8px; width: 100%; align-items: center; justify-content: center; flex-wrap: wrap; }
        
        .header-controls-right select { width: calc(50% - 4px); height: 44px; padding: 0 12px; font-size: 0.88rem; border-radius: 8px; flex-grow: 1; }
        .inventory-head-flex .btn { flex: 1; height: 44px; min-height: 44px; margin: 0; }

        .order-summary-wrapper { display: flex; align-items: center; gap: 8px; width: 100%; justify-content: space-between; }
        .order-summary-wrapper .btn { flex: 1; min-height: 38px; height: 38px; font-size: 0.75rem; padding: 2px 8px; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        @media (min-width: 768px) {
            body { padding: 16px; }
            .inventory-head-flex { flex-direction: row; justify-content: space-between; align-items: center; }
            .inventory-title-centered { flex: 1; text-align: center; order: 2; }
            .header-controls-left { width: auto; justify-content: flex-start; order: 1; }
            .header-controls-right { width: auto; justify-content: flex-end; order: 3; flex-wrap: nowrap; }
            .header-controls-right select { width: 130px; flex-grow: 0; }
            .column-visibility-dropdown-container { width: 160px; flex-grow: 0; }
            .form-grid { flex-direction: row; flex-wrap: wrap; }
            .form-unit { flex: 1 1 calc(25% - 12px); }
            .calc-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
            .order-tab-header { flex-direction: row; justify-content: space-between; align-items: center; }
            .order-summary-wrapper { width: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>ORDER FORM</h2>
        <button class="btn btn-header-shortcut" onclick="scrollToOrders()">📦 View Orders</button>
    </div>

    <div class="workspace-row">
        <div class="bottom-full">
            <div class="card">
                <h3>
                    <div class="inventory-head-flex">
                        <div class="inventory-title-centered">Inventory List</div>
                        <div class="header-controls-left">
                            <label class="btn btn-excel" title="Import CSV">
                                📊 Import
                                <input type="file" id="csvInput" accept=".csv" style="display:none;" onchange="importCSV(event)">
                            </label>
                            <button class="btn btn-export-all" onclick="exportInventoryCSV()">💾 Export</button>
                            <button class="btn" style="background: var(--md-sys-color-error-container); color: var(--md-sys-color-error);" onclick="clearInventory()">🗑️ Clear</button>
                        </div>
                        <div class="header-controls-right">
                            <select id="statusFilter" onchange="renderTable()">
                                <option value="All">All Status</option>
                                <option value="Active">Active</option>
                                <option value="Blocked">Blocked</option>
                            </select>

                            <div class="column-visibility-dropdown-container">
                                <button class="dropdown-trigger-btn" onclick="toggleVisibilityDropdown(event)">Columns</button>
                                <div class="dropdown-menu-panel" id="columnVisibilityMenu">
                                    <label class="dropdown-item-label" onclick="stopPropagation(event)"><input type="checkbox" id="chkToggleId" onchange="toggleColumnVisibility('id', this.checked)"> ID</label>
                                    <label class="dropdown-item-label" onclick="stopPropagation(event)"><input type="checkbox" id="chkToggleBarcode" onchange="toggleColumnVisibility('barcode', this.checked)"> Barcode</label>
                                    <label class="dropdown-item-label" onclick="stopPropagation(event)"><input type="checkbox" id="chkToggleStock" onchange="toggleColumnVisibility('stock', this.checked)"> Stock</label>
                                    <label class="dropdown-item-label" onclick="stopPropagation(event)"><input type="checkbox" id="chkToggleActions" onchange="toggleColumnVisibility('actions', this.checked)"> Actions</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </h3>

                <div class="filter-search-wrapper" id="searchFieldWrapper">
                    <div class="filter-search-container">
                        <input type="text" id="tableFilter" placeholder="Search" oninput="renderTable()" onfocus="focusAndScrollSearch()">
                        <button class="btn-clear-search" onclick="clearSearchField()" title="Clear Search">✕</button>
                        <button class="btn-scan-barcode" onclick="triggerBarcodeScanner()" title="Scan Barcode">
                            <svg viewBox="0 0 24 24">
                                <path d="M4 4h3V2H4c-1.1.0-2 .9-2 2v3h2V4zm16-2h-3v2h3v3h2V4c0-1.1-.9-2-2-2zm2 16h-2v3h-3v2h4c1.1 0 2-.9 2-2v-3zM4 17H2v4c0 1.1.9 2 2 2h3v-2H4v-3zM6 6h2v12H6zm3 0h1v12H9zm3 0h2v12h-2zm3 0h3v12h-3zm4 0h1v12h-1z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="inventory-table-container">
                    <table id="inventoryTable">
                        <thead>
                            <tr>
                                <th class="col-id" style="width: 10%;">ID</th>
                                <th style="width: 30%;">Code</th>
                                <th style="width: 70%;">Description (Price / RSP)</th>
                                <th class="col-barcode" style="width: 20%;">Barcode</th>
                                <th class="col-stock" style="width: 10%;">Stock</th>

    <div class="workspace-row">
        <div id="targetWorkspaceCard" class="top-full">
            <div class="card" style="padding-bottom: 14px;">
                <div class="tab-container">
                    <button class="tab-btn active" id="tabOrderBtn" onclick="switchWorkspaceTab('order')">📦 Orders</button>
                    <button class="tab-btn" id="tabEntryBtn" onclick="switchWorkspaceTab('entry')">📝 Entry</button>
                    <button class="tab-btn" id="tabCalcBtn" onclick="switchWorkspaceTab('calc')">🧮 Profit</button>
                    <button class="tab-btn" id="tabToolkitBtn" onclick="switchWorkspaceTab('toolkit')">🖨️ Print</button>
                </div>
                
                <div id="orderTabPanel" class="tab-panel active">
                    <div class="order-tab-header">
                        <div class="order-tab-title">Procurement Worksheet</div>
                        <div class="order-summary-wrapper">
                            <button class="btn btn-excel" onclick="exportToExcel()">📈 Export</button>
                            <button class="btn" style="background:var(--md-sys-color-surface-variant); color:var(--md-sys-color-primary);" onclick="clearTransactions()">Clear Active</button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table id="transactionTable">
                            <thead>
                                <tr>
                                    <th style="width: 25%;">Code</th>
                                    <th style="width: 40%;">Description</th>
                                    <th style="width: 15%;" class="text-center">Qty</th>
                                    <th style="width: 15%;" class="text-right">Total</th>
                                    <th style="width: 5%;" class="text-center">X</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                            <tfoot>
                                <tr>
                                    <td colspan="3" class="text-right footer-metric-label">Total:</td>
                                    <td class="text-right footer-metric-val" id="footerTotalVal">0.00</td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td colspan="3" class="text-right footer-metric-label">VAT (5%):</td>
                                    <td class="text-right footer-metric-val" id="footerVatVal">0.00</td>
                                    <td></td>
                                </tr>
                                <tr class="grand-total-row">
                                    <td colspan="3" class="text-right footer-metric-label">Grand Total:</td>
                                    <td class="text-right footer-metric-val" id="footerGrandTotalVal">0.00</td>
                                    <td></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>

                <div id="entryTabPanel" class="tab-panel">
                    <div class="form-grid">
                        <div class="form-unit"><div class="form-group"><label>ID</label><input type="text" id="itemID"></div></div>
                        <div class="form-unit"><div class="form-group"><label>Code</label><input type="text" id="itemCode"></div></div>
                        <div class="form-unit"><div class="form-group"><label>Barcode</label><input type="text" id="barcode"></div></div>
                        <div class="form-unit"><div class="form-group"><label>Stock</label><input type="number" id="stock" placeholder="0"></div></div>
                        <div class="form-unit"><div class="form-group"><label>Description</label><input type="text" id="description"></div></div>
                        <div class="form-unit"><div class="form-group"><label>Price</label><input type="number" id="price" step="0.01"></div></div>
                        <div class="form-unit"><div class="form-group"><label>RSP</label><input type="number" id="rsp" step="0.01"></div></div>
                        <div class="form-unit">
                            <div class="form-group">
                                <label>Status</label>
                                <select id="status"><option value="Active">Active</option><option value="Blocked">Blocked</option></select>
                            </div>
                        </div>
                        <div class="form-unit" style="margin-top: 4px;">
                            <button class="btn btn-save" onclick="addItem()">Save Item</button>
                        </div>
                    </div>
                </div>

                <div id="calcTabPanel" class="tab-panel">
                    <div class="calc-grid">
                        <div class="calc-section calc-purchasing">
                            <label class="label" style="color:var(--purchasing-text); font-size:0.75rem; font-weight:700; display:block; margin-bottom:6px;">Purchasing</label>
                            <div class="calc-row">
                                <div>
                                    <label class="label">Outer Size</label>
                                    <input type="number" id="calcOuterSize" min="1" step="1" placeholder="144" style="background:rgba(255,255,255,0.8);">
                                </div>
                                <div>
                                    <label class="label">Outer Cost</label>
                                    <input type="number" id="calcOuterCost" min="0" step="0.01" placeholder="0.00" style="background:rgba(255,255,255,0.8);">
                                </div>
                                <div>
                                    <label class="label">Unit Cost</label>
                                    <input type="number" id="calcCost" min="0" step="0.01" value="20" style="background:rgba(255,255,255,0.8);">
                                </div>
                            </div>
                            <div>
                                <label class="label">Supplier Discount (%)</label>
                                <input type="number" id="calcCostDiscount" min="0" max="100" step="0.01" value="0" style="background:var(--discount); border-color:#fee2e2;">
                                <span id="calcNetCostLabel" class="net-cost">Net Unit Cost: 20.00</span>
                            </div>
                        </div>

                        <div class="calc-section calc-sales">
                            <label class="label" style="color:var(--sales-text); font-size:0.75rem; font-weight:700; display:block; margin-bottom:6px;">Sales</label>
                            <div class="calc-row">
                                <div>
                                    <label class="label">Selling Price</label>
                                    <input type="number" id="calcPrice" min="0" step="0.01" value="30.77" class="main-result">
                                </div>
                                <div>
                                    <label class="label">Deduction (%)</label>
                                    <input type="number" id="calcDeduction" min="0" max="100" step="0.01" value="18">
                                </div>
                            </div>
                        </div>

                        <div class="calc-section calc-profit">
                            <label class="label" style="color:var(--profit-text); font-size:0.75rem; font-weight:700; display:block; margin-bottom:6px;">Profitability</label>
                            <div>
                                <label class="label">Target Margin (%)</label>
                                <input type="number" id="calcMargin" min="0" max="100" step="0.01" value="35" class="margin-result">
                            </div>
                            <div id="calcProfitAmount" class="profit-amount">Profit per Unit: 0.00</div>
                        </div>
                    </div>
                </div>

                <div id="toolkitTabPanel" class="tab-panel">
                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        
                        <div class="header-controls-left" style="gap: 12px; width:100%;">
                            <button id="btnToggleToolkitScanner" class="camera-btn" style="flex: 2; margin-bottom:0;" onclick="toggleToolkitScanner()">📷 Live Scan</button>
                            <label class="btn btn-excel" style="flex: 1; height:46px; min-height:46px; background:var(--md-sys-color-primary-container); color:var(--md-sys-color-primary);" title="Import 6th Column (Column F) From File">
                                📊 Import Column F
                                <input type="file" id="toolkitExcelInput" accept=".csv,.txt" style="display:none;" onchange="importToolkitFile(event)">
                            </label>
                        </div>
                        
                        <div id="toolkitLiveReader"></div>
                        <div id="scanStatus"></div>

                        <div class="form-group">
                            <label style="margin-bottom: 6px;">Scanned Code Matrix Queue:</label>
                            <textarea id="barcodeInput" rows="5" placeholder="Scanned or imported items appear here automatically..."></textarea>
                        </div>
                        
                        <div class="header-controls-left" style="margin-top: 4px; gap: 12px;">
                            <button class="btn btn-save" style="flex: 2; height: 44px; background: var(--md-sys-color-accent);" onclick="generateBarcodes()">⚙️ Generate Batch</button>
                            <button class="btn" style="flex: 1; height: 44px; background: var(--md-sys-color-error-container); color: var(--md-sys-color-error);" onclick="clearToolkitBox()">🗑️ Reset</button>
                        </div>

                        <div id="toolkitOutput"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<div id="scannerModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; flex-direction: column; align-items: center; justify-content: center;">
    <div style="width: 85%; max-width: 400px; background: var(--md-sys-color-surface); border-radius: 16px; padding: 16px; box-sizing: border-box; position: relative;">
        <h4 style="margin: 0 0 12px 0; color: var(--md-sys-color-primary); font-size: 0.9rem; text-transform: uppercase;">Scan Barcode</h4>
        
        <div id="interactive-reader" style="width: 100%; border-radius: 8px; overflow: hidden; background: #000;"></div>
        
        <button class="btn" style="width: 100%; margin-top: 14px; background: var(--md-sys-color-error-container); color: var(--md-sys-color-error);" onclick="closeBarcodeScanner()">❌ Cancel</button>
    </div>
</div>
<script>
    let inventory = JSON.parse(localStorage.getItem('flamingo_db_v3')) || [];
    let transactions = JSON.parse(localStorage.getItem('flamingo_trans_v3')) || [];

    let visibleColumns = {
        id: false,
        barcode: false,
        stock: false,
        actions: false
    };

    const elements = {
        itemID: document.getElementById('itemID'),
        itemCode: document.getElementById('itemCode'),
        barcode: document.getElementById('barcode'),
        description: document.getElementById('description'),
        price: document.getElementById('price'),
        rsp: document.getElementById('rsp'),
        stock: document.getElementById('stock'),
        status: document.getElementById('status'),
        tableFilter: document.getElementById('tableFilter'),
        statusFilter: document.getElementById('statusFilter'),
        inventoryTbody: document.querySelector("#inventoryTable tbody"),
        transactionTbody: document.querySelector("#transactionTable tbody"),
        footerTotalVal: document.getElementById('footerTotalVal'),
        footerVatVal: document.getElementById('footerVatVal'),
        footerGrandTotalVal: document.getElementById('footerGrandTotalVal'),
        csvInput: document.getElementById('csvInput'),
        toolkitExcelInput: document.getElementById('toolkitExcelInput')
    };

    const calcEl = {
        outerSize: document.getElementById("calcOuterSize"),
        outerCost: document.getElementById("calcOuterCost"),
        cost: document.getElementById("calcCost"),
        costDiscount: document.getElementById("calcCostDiscount"),
        price: document.getElementById("calcPrice"),
        margin: document.getElementById("calcMargin"),
        deduction: document.getElementById("calcDeduction"),
        netLabel: document.getElementById("calcNetCostLabel"),
        profitLabel: document.getElementById("calcProfitAmount"),
        tabEntryBtn: document.getElementById("tabEntryBtn"),
        tabCalcBtn: document.getElementById("tabCalcBtn"),
        tabOrderBtn: document.getElementById("tabOrderBtn"),
        tabToolkitBtn: document.getElementById("tabToolkitBtn"),
        entryPanel: document.getElementById("entryTabPanel"),
        calcPanel: document.getElementById("calcTabPanel"),
        orderPanel: document.getElementById("orderTabPanel"),
        toolkitPanel: document.getElementById("toolkitTabPanel")
    };

    // Global toolkit references
    const scanStatus = document.getElementById('scanStatus');
    const toolkitTextarea = document.getElementById('barcodeInput');
    let toolkitLiveScanner = null;
    let lastScannedCode = "";
    let throttleTimeout = null;

    window.onload = () => { 
        if (elements.statusFilter) {
            elements.statusFilter.value = "Active";
        }

        renderTable(); 
        renderTransactions(); 
        loadCalcData();
        updatePrice();
        
        document.addEventListener("click", () => {
            const menu = document.getElementById("columnVisibilityMenu");
            if(menu) menu.classList.remove("show");
        });
    };

    // Corrected File Parsing loop structure maps column indexes reliably
    function importToolkitFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split(/\r?\n/);
            if (lines.length <= 0) return alert("The selected file structure is completely empty.");

            let parsedCodes = [];
            const targetColumnIndex = 5; // 6th position index parameter matching Column F

            for (let i = 0; i < lines.length; i++) {
                const lineClean = lines[i].trim();
                if (!lineClean) continue; 

                const segments = parseCSVLine(lineClean);
                // Dynamic layout length verification fallback logic protection rules
                if (segments.length > targetColumnIndex) {
                    const targetCodeValue = segments[targetColumnIndex].replace(/^["']|["']$/g, '').trim();
                    if (targetCodeValue !== "") { 
                        parsedCodes.push(targetCodeValue);
                    }
                }
            }

            if (parsedCodes.length === 0) {
                alert("Import Finished: Found no structural non-blank items inside the 6th column (F).");
            } else {
                let currentVal = toolkitTextarea.value.trim();
                if (currentVal.length > 0) {
                    currentVal += "\n";
                }
                toolkitTextarea.value = currentVal + parsedCodes.join("\n") + "\n";
                scanStatus.style.color = "#16a34a";
                scanStatus.innerText = `📊 Successfully imported ${parsedCodes.length} barcode inputs from Column F.`;
                
                generateBarcodes();
            }

            if (elements.toolkitExcelInput) elements.toolkitExcelInput.value = "";
        };
        reader.readAsText(file);
    }

    // Live continuous video stream framework logic inside Toolkit Tab
    function toggleToolkitScanner() {
        const readerElement = document.getElementById('toolkitLiveReader');
        const btn = document.getElementById('btnToggleToolkitScanner');

        if (toolkitLiveScanner) {
            stopToolkitScanner();
            return;
        }

        readerElement.style.display = "block";
        btn.innerText = "🛑 Stop Scanner";
        btn.style.backgroundColor = "var(--md-sys-color-error)";
        scanStatus.style.color = "var(--md-sys-color-primary)";
        scanStatus.innerText = "🎥 Camera active. Positioning barcode...";

        toolkitLiveScanner = new Html5Qrcode("toolkitLiveReader");
        const config = { fps: 15, qrbox: { width: 260, height: 140 } };

        toolkitLiveScanner.start(
            { facingMode: "environment" },
            config,
            (decodedText) => {
                const scannedClean = decodedText.trim();
                
                if (scannedClean === lastScannedCode) return;
                lastScannedCode = scannedClean;

                clearTimeout(throttleTimeout);
                throttleTimeout = setTimeout(() => { lastScannedCode = ""; }, 2500);

                scanStatus.style.color = "#16a34a";
                scanStatus.innerText = `✅ Added: ${scannedClean}`;

                let currentValue = toolkitTextarea.value;
                if (currentValue.length > 0 && !currentValue.endsWith('\n')) {
                    currentValue += '\n';
                }
                toolkitTextarea.value = currentValue + scannedClean + '\n';
                
                generateBarcodes();
            },
            (errorMessage) => { }
        ).catch(err => {
            alert("Camera access denied or failed: " + err);
            stopToolkitScanner();
        });
    }

    function stopToolkitScanner() {
        const readerElement = document.getElementById('toolkitLiveReader');
        const btn = document.getElementById('btnToggleToolkitScanner');
        
        btn.innerText = "📷 Live Scan";
        btn.style.backgroundColor = "var(--md-sys-color-outline)";
        scanStatus.innerText = "";
        readerElement.style.display = "none";

        if (toolkitLiveScanner) {
            toolkitLiveScanner.stop().then(() => {
                toolkitLiveScanner.clear();
                toolkitLiveScanner = null;
            }).catch(err => {
                console.error("Scanner dynamic release fault:", err);
                toolkitLiveScanner = null;
            });
        }
    }

    function clearToolkitBox() {
        stopToolkitScanner();
        toolkitTextarea.value = '';
        document.getElementById('toolkitOutput').innerHTML = '';
        scanStatus.innerText = '';
    }

    function generateBarcodes() {
        const input = toolkitTextarea.value;
        const outputDiv = document.getElementById('toolkitOutput');
        outputDiv.innerHTML = '';

        const lines = input.split('\n').map(line => line.trim()).filter(line => line !== '');

        if (lines.length === 0) return;

        lines.forEach((code, index) => {
            const container = document.createElement('div');
            container.className = 'barcode-container';

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.id = 'barcode-render-' + index;
            
            container.appendChild(svg);
            outputDiv.appendChild(container);

            try {
                JsBarcode("#barcode-render-" + index, code, {
                    format: "CODE128",
                    lineColor: "#023047",
                    width: 2,
                    height: 70,
                    displayValue: true,
                    fontSize: 16,
                    margin: 8
                });
            } catch (error) {
                const errorMsg = document.createElement('p');
                errorMsg.className = 'barcode-error';
                errorMsg.innerText = `Format Error "${code}"`;
                container.innerHTML = '';
                container.appendChild(errorMsg);
            }
        });
    }

    function sync() {
        localStorage.setItem('flamingo_db_v3', JSON.stringify(inventory));
        localStorage.setItem('flamingo_trans_v3', JSON.stringify(transactions));
        renderTable();
    }

    function toggleVisibilityDropdown(event) {
        event.stopPropagation();
        const menu = document.getElementById("columnVisibilityMenu");
        if(menu) menu.classList.toggle("show");
    }

    function stopPropagation(event) {
        event.stopPropagation();
    }

    function clearSearchField() {
        if (elements.tableFilter) {
            elements.tableFilter.value = "";
            renderTable();
            elements.tableFilter.focus();
        }
    }

    function focusAndScrollSearch() {
        const target = document.getElementById('searchFieldWrapper');
        if (target) {
            setTimeout(() => {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }
    }

    let html5QrcodeScanner = null;

    function triggerBarcodeScanner() {
        const modal = document.getElementById('scannerModal');
        modal.style.display = 'flex';

        html5QrcodeScanner = new Html5Qrcode("interactive-reader");

        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 150 }
        };

        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                elements.tableFilter.value = decodedText.trim();
                renderTable();
                closeBarcodeScanner();
                focusAndScrollSearch();
            },
            (errorMessage) => {
            }
        ).catch(err => {
            alert("Camera initialization failed: " + err);
            closeBarcodeScanner();
        });
    }

    function closeBarcodeScanner() {
        const modal = document.getElementById('scannerModal');
        modal.style.display = 'none';
        
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                html5QrcodeScanner.clear();
                html5QrcodeScanner = null;
            }).catch(err => {
                console.error("Failed to safely release camera resource:", err);
                html5QrcodeScanner = null;
            });
        }
    }
    function scrollToOrders() {
        switchWorkspaceTab('order');
        const container = document.getElementById('targetWorkspaceCard');
        if (container) {
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    function toggleColumnVisibility(columnClass, isChecked) {
        visibleColumns[columnClass] = isChecked;
        const thElements = document.querySelectorAll(`#inventoryTable th.col-${columnClass}`);
        thElements.forEach(el => el.style.display = isChecked ? 'table-cell' : 'none');
        const tdElements = document.querySelectorAll(`#inventoryTable td.col-${columnClass}`);
        tdElements.forEach(el => el.style.display = isChecked ? 'table-cell' : 'none');
    }

    function switchWorkspaceTab(targetTab) {
        if(targetTab !== 'toolkit') {
            stopToolkitScanner();
        }

        [calcEl.tabEntryBtn, calcEl.tabCalcBtn, calcEl.tabOrderBtn, calcEl.tabToolkitBtn].forEach(btn => {
            if(btn) btn.classList.remove('active');
        });
        [calcEl.entryPanel, calcEl.calcPanel, calcEl.orderPanel, calcEl.toolkitPanel].forEach(panel => {
            if(panel) panel.classList.remove('active');
        });

        if (targetTab === 'entry' && calcEl.tabEntryBtn && calcEl.entryPanel) {
            calcEl.tabEntryBtn.classList.add('active');
            calcEl.entryPanel.classList.add('active');
        } else if (targetTab === 'calc' && calcEl.tabCalcBtn && calcEl.calcPanel) {
            calcEl.tabCalcBtn.classList.add('active');
            calcEl.calcPanel.classList.add('active');
        } else if (targetTab === 'order' && calcEl.tabOrderBtn && calcEl.orderPanel) {
            calcEl.tabOrderBtn.classList.add('active');
            calcEl.orderPanel.classList.add('active');
        } else if (targetTab === 'toolkit' && calcEl.tabToolkitBtn && calcEl.toolkitPanel) {
            calcEl.tabToolkitBtn.classList.add('active');
            calcEl.toolkitPanel.classList.add('active');
        }
    }

    function editItem(barcode) {
        const item = inventory.find(i => i.barcode === barcode);
        if (item) {
            if(!visibleColumns.actions) {
                const chk = document.getElementById('chkToggleActions');
                if(chk) chk.checked = true;
                toggleColumnVisibility('actions', true);
            }
            switchWorkspaceTab('entry');
            elements.itemID.value = item.id;
            elements.itemCode.value = item.code;
            elements.barcode.value = item.barcode;
            elements.description.value = item.desc;
            elements.price.value = item.price;
            elements.rsp.value = item.rsp;
            elements.stock.value = item.stock;
            elements.status.value = item.status;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function addItem() {
        const codeVal = elements.itemCode.value.toUpperCase().trim();
        const barcodeVal = elements.barcode.value.trim();
        
        if (!codeVal || !barcodeVal) return alert("Required: Code & Barcode");

        const item = {
            uniqueRef: Date.now(),
            id: elements.itemID.value.trim(),
            code: codeVal,
            barcode: barcodeVal,
            desc: elements.description.value.trim(),
            price: elements.price.value || "0.00",
            rsp: elements.rsp.value || "0.00",
            stock: elements.stock.value || "0",
            status: elements.status.value
        };

        inventory = inventory.filter(i => i.barcode !== item.barcode);
        inventory.push(item);
        sync();
        clearEntryForm();
        renderTransactions(); 
    }

    function clearEntryForm() {
        ['itemID', 'itemCode', 'barcode', 'description', 'price', 'rsp', 'stock'].forEach(id => {
            if(elements[id]) elements[id].value = "";
        });
        if(elements.status) elements.status.value = "Active";
    }

    function delItem(ref) { 
        if(confirm("Delete item?")) { 
            inventory = inventory.filter(i => i.uniqueRef !== ref); 
            sync(); 
            renderTransactions(); 
        } 
    }

    function renderTable() {
        const filterInput = elements.tableFilter.value.toLowerCase().trim();
        const searchTokens = filterInput.split(/\s+/).filter(t => t.length > 0);
        const stat = elements.statusFilter.value;
        
        let htmlBuffer = '';

        const filtered = inventory.filter(i => {
            if (stat !== "All" && i.status !== stat) return false;
            if (searchTokens.length === 0) return true;
            const itemString = `${i.code} ${i.barcode} ${i.desc} ${i.id}`.toLowerCase();
            return searchTokens.every(token => itemString.includes(token));
        });

        filtered.forEach(i => {
            const dotClass = i.status === 'Active' ? 'dot-active' : 'dot-blocked';
            
            const idStyle = visibleColumns.id ? 'table-cell' : 'none';
            const barcodeStyle = visibleColumns.barcode ? 'table-cell' : 'none';
            const stockStyle = visibleColumns.stock ? 'table-cell' : 'none';
            const actionsStyle = visibleColumns.actions ? 'table-cell' : 'none';

            const priceNum = Number(i.price).toFixed(2);
            const rspNum = Number(i.rsp).toFixed(2);

            htmlBuffer += `
                <tr>
                    <td class="col-id" style="display: ${idStyle};">${i.id}</td>
                    <td>
                        <div class="code-cell">
                            <span style="font-weight:700; font-family:monospace;">${i.code}</span>
                            <button class="btn btn-plus" title="Add to Order" onclick="addTrans('${i.code}')">➕</button>
                        </div>
                    </td>
                    <td class="wrap-cell">
                        <span class="status-dot ${dotClass}" title="${i.status}"></span>${i.desc} <span style="font-family:monospace; font-weight:500; color:var(--md-sys-color-primary);">(${priceNum} / <span style="color:var(--rsp-highlight-text); font-weight:700;">${rspNum}</span>)</span>
                    </td>
                    <td class="col-barcode" style="display: ${barcodeStyle}; font-family:monospace;">${i.barcode}</td>
                    <td class="col-stock" style="display: ${stockStyle};"><strong>${i.stock}</strong></td>
                    <td class="col-actions" style="display: ${actionsStyle};">
                        <div class="action-cell">
                            <button class="btn btn-edit" title="Edit Item" onclick="editItem('${i.barcode}')">✏️</button>
                            <button class="btn btn-delete" title="Delete Item" onclick="delItem(${i.uniqueRef})">🗑️</button>
                        </div>
                    </td>
                </tr>`;
        });
        
        elements.inventoryTbody.innerHTML = htmlBuffer;
    }

    function addTrans(code) {
        const item = inventory.find(i => i.code === code);
        if (!item) return;
        transactions.push({ code: item.code, desc: item.desc, qty: 12, price: item.price, ref: Date.now() });
        syncTransactions();
        scrollToOrders();
    }

    function updateQty(ref, val) {
        const t = transactions.find(item => item.ref === ref);
        if (t) { 
            t.qty = val; 
            localStorage.setItem('flamingo_trans_v3', JSON.stringify(transactions)); 
            calculateGrandTotal();
            const rowTotalSpan = document.getElementById(`row-total-${ref}`);
            if(rowTotalSpan) {
                const currentItem = inventory.find(i => i.code === t.code);
                const unitPrice = currentItem ? Number(currentItem.price) : (Number(t.price) || 0);
                rowTotalSpan.innerText = (unitPrice * Number(val)).toFixed(2);
            }
        }
    }

    function syncTransactions() {
        localStorage.setItem('flamingo_trans_v3', JSON.stringify(transactions));
        renderTransactions();
    }

    function renderTransactions() {
        elements.transactionTbody.innerHTML = transactions.map(t => {
            const currentItem = inventory.find(i => i.code === t.code);
            const unitPrice = currentItem ? Number(currentItem.price) : (Number(t.price) || 0);
            const lineTotal = unitPrice * Number(t.qty);
            
            return `
                <tr>
                    <td style="font-weight:700; font-family:monospace;">${t.code}</td>
                    <td class="wrap-cell">${t.desc}</td>
                    <td class="text-center"><input type="number" class="qty-input" value="${t.qty}" min="1" oninput="updateQty(${t.ref}, this.value)"></td>
                    <td class="text-right" style="font-weight:700; color:var(--md-sys-color-primary); font-family:monospace;"><span id="row-total-${t.ref}">${lineTotal.toFixed(2)}</span></td>
                    <td class="text-center"><button class="btn btn-delete" style="width:28px; height:28px; min-height:28px;" onclick="remTrans(${t.ref})">×</button></td>
                </tr>`;
        }).join('');
        
        calculateGrandTotal();
    }

    function calculateGrandTotal() {
        let subtotal = 0;
        transactions.forEach(t => {
            const currentItem = inventory.find(i => i.code === t.code);
            const unitPrice = currentItem ? Number(currentItem.price) : (Number(t.price) || 0);
            subtotal += unitPrice * (Number(t.qty) || 0);
        });
        
        const vatTotal = subtotal * 0.05;
        const netGrandTotal = subtotal + vatTotal;

        if (elements.footerTotalVal) elements.footerTotalVal.innerText = subtotal.toFixed(2);
        if (elements.footerVatVal) elements.footerVatVal.innerText = vatTotal.toFixed(2);
        if (elements.footerGrandTotalVal) elements.footerGrandTotalVal.innerText = netGrandTotal.toFixed(2);
    }

    function remTrans(ref) { transactions = transactions.filter(t => t.ref !== ref); syncTransactions(); }
    function clearTransactions() { transactions = []; syncTransactions(); }

    function exportInventoryCSV() {
        if (!inventory.length) return alert("Inventory is empty!");
        let csv = "ID,Code,Barcode,Description,Price,RSP,Stock,Status\n";
        inventory.forEach(i => {
            csv += `"${i.id}","${i.code}","${i.barcode}","${i.desc}","${i.price}","${i.rsp}","${i.stock}","${i.status}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Flamingo_Inventory_Backup_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }

    function exportToExcel() {
        if (!transactions.length) return alert("No items found in the Active Order List.");
        let filename = prompt("Enter Export Filename:", "Flamingo_Order");
        if (!filename) return; 

        let csvContent = "\uFEFF"; 
        csvContent += "Code,Description,Quantity\n"; 
        let sortedTransactions = [...transactions].sort((a, b) => Number(b.qty) - Number(a.qty));

        sortedTransactions.forEach(t => {
            const cleanedDescription = t.desc.replace(/"/g, '""');
            csvContent += `"${t.code}","${cleanedDescription}",${t.qty}\n`; 
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${filename.trim().replace(/[\/\?<>\\:\*\|"]/g, '_')}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function parseCSVLine(text) {
        let p = '', r = [];
        let q = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"') { q = !q; }
            else if (c === ',' && !q) { r.push(p); p = ''; }
            else { p += c; }
        }
        r.push(p);
        return r;
    }

    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split(/\r?\n/);
            if(lines.length <= 1) return;

            let timestampBase = Date.now();
            let newItems = [];

            for (let i = 1; i < lines.length; i++) {
                const lineClean = lines[i].trim();
                if (!lineClean) continue;
                
                const c = parseCSVLine(lineClean);
                if (c.length >= 6) {
                    newItems.push({
                        uniqueRef: timestampBase + i,
                        id: (c[0] || "").trim(), 
                        code: (c[1] || "").trim().toUpperCase(),
                        barcode: (c[2] || "").trim(), 
                        desc: (c[3] || "").trim(),
                        price: (c[4] || "").trim() || "0.00", 
                        rsp: (c[5] || "").trim() || "0.00",
                        stock: (c[6] || "").trim() || "0", 
                        status: (c[7] || "").trim() || "Active"
                    });
                }
            }

            if(newItems.length > 0) {
                const barcodeMap = new Set(newItems.map(item => item.barcode));
                inventory = inventory.filter(i => !barcodeMap.has(i.barcode)).concat(newItems);
                sync();
                alert(`Successfully imported ${newItems.length} items!`);
            }
            if(elements.csvInput) elements.csvInput.value = "";
        };
        reader.readAsText(file);
    }

    function clearInventory() { if(confirm("Delete ALL?")) { inventory = []; sync(); renderTransactions(); } }

    const num = value => parseFloat(value) || 0;

    function saveCalcData() {
        localStorage.setItem("flamingo-calculator",
            JSON.stringify({
                outerSize: calcEl.outerSize.value,
                outerCost: calcEl.outerCost.value,
                cost: calcEl.cost.value,
                costDiscount: calcEl.costDiscount.value,
                price: calcEl.price.value,
                margin: calcEl.margin.value,
                deduction: calcEl.deduction.value
            })
        );
    }

    function loadCalcData() {
        const saved = JSON.parse(localStorage.getItem("flamingo-calculator") || "{}");
        Object.keys(saved).forEach(key => {
            if(calcEl[key]) {
                calcEl[key].value = saved[key];
            }
        });
    }

    function getNetCost() {
        return num(calcEl.cost.value) * (1 - num(calcEl.costDiscount.value) / 100);
    }

    function updateNetLabel(cost) {
        if(calcEl.netLabel) calcEl.netLabel.textContent = `Net Unit Cost: ${cost.toFixed(2)}`;
    }

    function updateProfitDisplay(price, deduction, cost) {
        const profit = price - (price * deduction) - cost;
        if(calcEl.profitLabel) calcEl.profitLabel.textContent = `Profit per Unit: ${profit.toFixed(2)}`;
    }

    function updatePrice() {
        const cost = getNetCost();
        const margin = num(calcEl.margin.value) / 100;
        const deduction = num(calcEl.deduction.value) / 100;

        updateNetLabel(cost);
        const divisor = 1 - deduction - margin;

        if(divisor <= 0){
            if(calcEl.price) calcEl.price.value = "";
            if(calcEl.profitLabel) calcEl.profitLabel.textContent = "Invalid Margin/Deduction";
            return;
        }

        const price = cost / divisor;
        if(calcEl.price) calcEl.price.value = price.toFixed(2);
        updateProfitDisplay(price, deduction, cost);
        saveCalcData();
    }

    function updateMargin() {
        const price = num(calcEl.price.value);
        const cost = getNetCost();
        const deduction = num(calcEl.deduction.value) / 100;

        updateNetLabel(cost);
        if(price <= 0){
            if(calcEl.margin) calcEl.margin.value = 0;
            return;
        }

        const margin = ((price - (price * deduction) - cost) / price) * 100;
        if(calcEl.margin) calcEl.margin.value = margin.toFixed(2);
        updateProfitDisplay(price, deduction, cost);
        saveCalcData();
    }

    function runOuterCalculation() {
        const oSize = num(calcEl.outerSize.value);
        const oCost = num(calcEl.outerCost.value);
        if(oSize > 0 && calcEl.cost) {
            calcEl.cost.value = (oCost / oSize).toFixed(2);
        }
        updatePrice();
    }

    if(calcEl.outerSize) calcEl.outerSize.addEventListener("input", runOuterCalculation);
    if(calcEl.outerCost) calcEl.outerCost.addEventListener("input", runOuterCalculation);

    if(calcEl.cost) {
        calcEl.cost.addEventListener("input", () => {
            if(calcEl.outerSize) calcEl.outerSize.value = "";
            if(calcEl.outerCost) calcEl.outerCost.value = "";
            updatePrice();
        });
    }

    ["costDiscount", "margin", "deduction"].forEach(id => {
        if(calcEl[id]) calcEl[id].addEventListener("input", updatePrice);
    });

    if(calcEl.price) calcEl.price.addEventListener("input", updateMargin);
</script>
