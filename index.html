<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Order Form</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        :root {
            /* Material Design 3 Tonal Color Palette Reference Tokens */
            --md-sys-color-bg: #f7f9fc;
            --md-sys-color-surface: #ffffff;
            --md-sys-color-surface-variant: #e1e7ed;
            --md-sys-color-primary: #2d4622;
            --md-sys-color-primary-container: #d2ebd0;
            --md-sys-color-on-primary-container: #0b2009;
            --md-sys-color-accent: #0a58ca;
            --md-sys-color-accent-container: #e0ebff;
            --md-sys-color-error: #ba1a1a;
            --md-sys-color-error-container: #ffdad6;
            --md-sys-color-on-error-container: #410002;
            --md-sys-color-outline: #72787e;
            --md-sys-color-text: #1a1c1e;
            --md-sys-color-text-secondary: #42474e;

            /* Profit Calculator Specific Colors */
            --purchasing: #fff7ed;
            --sales: #eff6ff;
            --profit: #f0fdf4;
            --purchasing-text: #9a3412;
            --sales-text: #1e40af;
            --profit-text: #166534;
            --discount: #fef2f2;
            --discount-text: #991b1b;
        }

        body { 
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: var(--md-sys-color-bg); 
            margin: 0; 
            padding: 16px; 
            color: var(--md-sys-color-text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
        }
        
        .container { max-width: 1440px; margin: 0 auto; }
        
        /* Material Header Element Bar Layout */
        .header { 
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px; 
            background: var(--md-sys-color-surface); 
            padding: 12px 24px; 
            border-radius: 16px; 
            border: 1px solid var(--md-sys-color-surface-variant);
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { max-width: 64px; height: auto; object-fit: contain; }
        .header h2 { margin: 0; font-size: 1.25rem; color: var(--md-sys-color-primary); font-weight: 700; letter-spacing: -0.2px; }

        .workspace-row {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .top-full, .bottom-full { width: 100%; }

        /* Material Design Card Elevation Paradigm */
        .card { 
            background: var(--md-sys-color-surface); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--md-sys-color-surface-variant);
            box-sizing: border-box;
            height: 100%;
        }
        
        h3 { 
            margin-top: 0; 
            color: var(--md-sys-color-primary); 
            font-size: 0.85rem; 
            border-bottom: 1px solid var(--md-sys-color-surface-variant); 
            padding-bottom: 12px; 
            text-transform: uppercase; 
            letter-spacing: 0.08em; 
            display: flex; 
            flex-direction: column;
            gap: 8px;
            font-weight: 700;
        }

        /* Interactive Tab Container Layout styling */
        .tab-container {
            display: flex;
            gap: 6px;
            border-bottom: 1px solid var(--md-sys-color-surface-variant);
            padding-bottom: 0px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 18px;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--md-sys-color-text-secondary);
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .tab-btn:hover {
            color: var(--md-sys-color-primary);
            background: var(--md-sys-color-bg);
        }
        .tab-btn.active {
            color: var(--md-sys-color-primary);
            background: transparent;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--md-sys-color-primary);
            border-radius: 3px 3px 0 0;
        }
        
        @media (min-width: 768px) {
            body { padding: 24px; }
        }

        /* Continuous Single-Line Entry Form Core Layout Matrix */
        .form-grid { 
            display: flex;
            flex-direction: row;
            gap: 10px; 
            align-items: flex-end;
            width: 100%;
            flex-wrap: wrap;
            padding-bottom: 4px;
        }

        .form-unit {
            flex: 1 1 95px;
            display: flex;
            flex-direction: column;
        }

        .form-unit.half-unit { flex: 0.6 1 65px; }
        .form-unit.barcode-unit { flex: 1.5 1 135px; }
        .form-unit.desc-unit { flex: 4 1 280px; }
        .form-unit.btn-unit { flex: 1.2 1 120px; }

        @media (max-width: 1280px) {
            .form-grid { flex-wrap: wrap; }
            .form-unit { flex: 1 1 calc(25% - 10px); min-width: 110px; }
            .form-unit.half-unit { flex: 1 1 calc(12.5% - 10px); min-width: 65px; }
            .form-unit.barcode-unit { flex: 1.5 1 calc(25% - 10px); min-width: 130px; }
            .form-unit.desc-unit { flex: 1 1 100%; }
            .form-unit.btn-unit { flex: 1 1 100%; }
        }

        .form-group { width: 100%; display: flex; flex-direction: column; }
        
        /* Material Text Label Flag specifications */
        label { 
            display: block; 
            font-size: 0.68rem; 
            font-weight: 700; 
            color: var(--md-sys-color-text-secondary); 
            margin-bottom: 6px; 
            text-transform: uppercase; 
            letter-spacing: 0.04em;
        }
        
        /* Material Form Controls Fields Styling Architecture + Apple Native Style Overrides */
        input, select { 
            width: 100%; 
            padding: 8px 12px; 
            border: 1px solid var(--md-sys-color-outline); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 0.88rem; 
            background: var(--md-sys-color-surface); 
            color: var(--md-sys-color-text);
            height: 38px; 
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            -webkit-appearance: none;
            appearance: none;
        }
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2342474e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
            padding-right: 32px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--md-sys-color-accent);
            border-width: 2px;
            padding: 7px 11px; /* Balances border offset weight variance */
        }
        select:focus {
            padding-right: 31px;
        }

        .tab-panel {
            display: none;
            opacity: 0;
            transition: opacity 0.25s ease-in-out;
        }
        .tab-panel.active {
            display: block;
            opacity: 1;
        }

        /* Profit Calculator Embedded Workspace Sub-Layout */
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }
        .calc-section {
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--md-sys-color-surface-variant);
        }
        .calc-purchasing { grid-column: span 1; background: var(--purchasing); }
        .calc-sales { background: var(--sales); }
        .calc-profit { background: var(--profit); border-color: #dcfce7; }
        .calc-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .calc-row > div { flex: 1; }
        .net-cost { display: block; margin-top: 8px; font-size: 0.78rem; font-weight: 600; color: var(--discount-text); }
        .profit-amount { margin-top: 10px; font-size: 0.95rem; font-weight: 700; color: var(--profit-text); }
        .main-result { font-weight: 700; color: var(--sales-text); border-color: var(--md-sys-color-accent); }
        .margin-result { font-weight: 700; color: var(--profit-text); }

        @media (min-width: 1200px) {
            .calc-grid { grid-template-columns: 1.2fr 1fr 1fr; }
        }

        /* Order List Header Configuration in Tab Layout */
        .order-tab-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--md-sys-color-surface-variant);
        }
        .order-tab-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--md-sys-color-primary);
        }

        /* Order Table Container - Unrestricted, row expansion adapts dynamically to viewport sizes */
        .table-container { 
            overflow-x: auto; 
            max-height: none; 
            height: auto;
            overflow-y: visible; 
            border-radius: 12px;
            border: 1px solid var(--md-sys-color-surface-variant);
            -webkit-overflow-scrolling: touch;
        }

        /* Inventory Table Container - Formatted strictly to 10 visible content rows max (Header 40px + 10 * 36px rows = 400px) */
        .inventory-table-container {
            overflow-x: auto;
            max-height: 400px; 
            height: 400px;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid var(--md-sys-color-surface-variant);
            -webkit-overflow-scrolling: touch;
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: auto; }
        
        th { 
            position: sticky; 
            top: 0; 
            background: var(--md-sys-color-bg); 
            text-align: left; 
            padding: 10px 12px; 
            font-size: 0.72rem; 
            font-weight: 700;
            color: var(--md-sys-color-text-secondary); 
            border-bottom: 2px solid var(--md-sys-color-surface-variant); 
            z-index: 10; 
            white-space: nowrap; 
        }
        td { padding: 8px 12px; border-bottom: 1px solid var(--md-sys-color-surface-variant); font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; height: 36px; box-sizing: border-box; }
        
        td.wrap-cell { white-space: normal; word-break: break-word; font-size: 0.82rem; line-height: 1.3; }

        tfoot {
            position: sticky;
            bottom: 0;
            background: var(--md-sys-color-bg);
            font-size: 0.85rem;
            z-index: 10;
        }
        tfoot td {
            border-top: 2px solid var(--md-sys-color-outline);
            border-bottom: none;
            padding: 8px 12px;
        }
        .footer-metric-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--md-sys-color-text-secondary); font-weight: bold; }
        .footer-metric-val { font-weight: 700; color: var(--md-sys-color-text); font-family: monospace; font-size: 0.9rem; }
        .grand-total-row td { background: var(--md-sys-color-accent-container); border-top: 1px dashed var(--md-sys-color-outline); }
        .grand-total-row .footer-metric-val { color: var(--md-sys-color-accent); font-size: 1.05rem; }

        /* Material M3 Styled Button Toolkit Matrix Setup */
        .btn { 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1); 
            padding: 8px 14px; 
            font-size: 0.82rem; 
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover { filter: brightness(0.92); transform: translateY(-0.5px); }
        .btn:active { transform: translateY(0.5px); }
        
        .btn-save { background: var(--md-sys-color-primary); color: white; width: 100%; height: 38px; font-size: 0.88rem; }
        .btn-plus { background: #15803d; color: white; padding: 4px 8px; font-size: 0.85rem; border-radius: 6px; min-height: 26px; }
        .btn-print { background: #4f46e5; color: white; padding: 4px 8px; font-size: 0.85rem; border-radius: 6px; min-height: 26px; }
        .btn-edit { background: #b45309; color: white; padding: 4px 8px; font-size: 0.85rem; border-radius: 6px; min-height: 26px; }
        .btn-delete { background: var(--md-sys-color-error-container); color: var(--md-sys-color-error); padding: 4px 8px; border-radius: 6px; font-size: 0.85rem; min-height: 26px; }
        .btn-excel { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); }
        .btn-export-all { background: #4b5563; color: white; }
        .btn-invoice { background: var(--md-sys-color-accent); color: white; height: 38px; padding: 0 16px; border-radius: 8px; }

        .qty-input { width: 56px !important; text-align: center; border: 1px solid var(--md-sys-color-accent) !important; font-weight: bold; height: 28px; padding: 2px; border-radius: 6px; font-size: 0.85rem; -webkit-appearance: none; appearance: none; }

        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; vertical-align: middle; flex-shrink: 0; }
        .dot-active { background-color: #16a34a; box-shadow: 0 0 4px #16a34a; }
        .dot-blocked { background-color: #dc2626; box-shadow: 0 0 4px #dc2626; }
        
        .action-cell { display: flex; gap: 4px; align-items: center; }
        .code-cell { display: flex; gap: 6px; align-items: center; justify-content: space-between; }
        
        .inventory-head-flex { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .inventory-title-centered { flex: 1; text-align: center; order: 2; font-weight: 700; font-size: 0.9rem; color: var(--md-sys-color-primary); }
        .header-controls-left { display: flex; gap: 8px; align-items: center; justify-content: flex-start; order: 1; }
        .header-controls-right { display: flex; gap: 8px; align-items: center; justify-content: flex-end; order: 3; }
        
        /* Expanded Filter Input Size Paradigm to 300px (Double-sized width footprint) */
        .inventory-head-flex input { width: 300px; height: 32px; font-size: 0.82rem; padding: 4px 10px; border-radius: 6px; -webkit-appearance: none; appearance: none; }
        .inventory-head-flex select { width: 110px; min-width: 110px; height: 32px; padding: 0 6px; font-size: 0.82rem; border-radius: 6px; }
        .inventory-head-flex .btn, .inventory-head-flex label { height: 32px; min-height: 32px; font-size: 0.78rem; padding: 4px 12px; border-radius: 6px; margin: 0; }

        @media (max-width: 900px) {
            .inventory-head-flex { flex-direction: column; gap: 10px; align-items: stretch; }
            .inventory-title-centered { text-align: center; order: 1; }
            .header-controls-left { justify-content: center; order: 2; flex-wrap: wrap; }
            .header-controls-right { justify-content: center; order: 3; }
            .inventory-head-flex input { width: 100%; }
        }

        .order-summary-wrapper { display: flex; align-items: center; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        #printArea { display: none; }

        @media print {
            @page { size: 42mm 29mm; margin: 0 !important; }
            body > * { display: none !important; }
            #printArea, #printArea * { display: block !important; }
            #printArea { position: absolute !important; left: 0 !important; top: 0 !important; margin: 0 !important; padding: 0 !important; width: 42mm !important; height: 29mm !important; background: #fff !important; }
            .print-label-card { width: 42mm !important; height: 29mm !important; padding: 0 !important; margin: 0 !important; box-sizing: border-box !important; display: flex !important; flex-direction: column !important; justify-content: flex-start !important; align-items: center !important; font-family: 'Courier New', Courier, monospace !important; font-size: 7pt !important; color: #000 !important; background: #fff !important; page-break-inside: avoid !important; page-break-after: always !important; overflow: hidden !important; }
            .p-top-spacer { height: 2.9mm !important; width: 100% !important; display: block !important; margin: 0 !important; padding: 0 !important; }
            .p-code { font-size: 7pt !important; font-weight: bold !important; text-align: center; white-space: nowrap; overflow: hidden; width: 100%; margin: 0 0 -0.5mm 0 !important; padding: 0 !important; line-height: 1.1; letter-spacing: -0.1px; }
            .p-bar-wrapper { width: 100% !important; margin: 0 !important; padding: 0 !important; display: flex !important; justify-content: center !important; align-items: center !important; }
            .p-bar-wrapper svg { max-width: 90% !important; height: 13.5mm !important; display: block !important; margin: 0 auto !important; padding: 0 !important; }
            .p-desc { font-size: 7pt !important; line-height: 1.1; white-space: nowrap !important; overflow: hidden !important; text-overflow: clip !important; text-align: center; font-weight: bold !important; width: 100%; box-sizing: border-box; margin: -0.5mm 0 0 0 !important; padding: 0 1mm !important; letter-spacing: -0.1px; }
        }
    </style>
</head>
<body>

<div id="printArea"></div>

<div class="container">
    <div class="header">
        <div class="header-left">
            <h2>ORDER FORM</h2>
        </div>
    </div>

    <div class="workspace-row">
        <div class="bottom-full">
            <div class="card">
                <h3>
                    <div class="inventory-head-flex">
                        <div class="header-controls-left">
                            <label class="btn btn-excel" title="Expected Columns: ID, Code, Barcode, Description, Price, RSP, Stock, Status">
                                📊 Import CSV
                                <input type="file" id="csvInput" accept=".csv" style="display:none;" onchange="importCSV(event)">
                            </label>
                            <button class="btn btn-export-all" onclick="exportInventoryCSV()">💾 Export CSV</button>
                            <button class="btn" style="background: var(--md-sys-color-error-container); color: var(--md-sys-color-error);" onclick="clearInventory()">🗑️ Clear DB</button>
                        </div>
                        <div class="inventory-title-centered">Inventory List</div>
                        <div class="header-controls-right">
                            <input type="text" id="tableFilter" placeholder="Filter..." oninput="renderTable()">
                            <select id="statusFilter" onchange="renderTable()">
                                <option value="All">All Status</option>
                                <option value="Active">Active</option>
                                <option value="Blocked">Blocked</option>
                            </select>
                        </div>
                    </div>
                </h3>
                <div class="inventory-table-container">
                    <table id="inventoryTable">
                        <thead>
                            <tr>
                                <th style="width: 8%;">ID</th>
                                <th style="width: 17%;">Code</th>
                                <th style="width: 38%;">Description</th>
                                <th style="width: 15%;">Barcode</th>
                                <th style="width: 17%;">Price / RSP</th>
                                <th style="width: 5%;">Stock</th>
                                <th style="width: 3%;">Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="workspace-row">
        <div class="top-full">
            <div class="card" style="padding-bottom: 16px;">
                <div class="tab-container">
                    <button class="tab-btn active" id="tabOrderBtn" onclick="switchWorkspaceTab('order')">📦 Active Order List</button>
                    <button class="tab-btn" id="tabEntryBtn" onclick="switchWorkspaceTab('entry')">📝 Item Entry</button>
                    <button class="tab-btn" id="tabCalcBtn" onclick="switchWorkspaceTab('calc')">🧮 Profit Calculator</button>
                </div>
                
                <div id="orderTabPanel" class="tab-panel active">
                    <div class="order-tab-header">
                        <div class="order-tab-title">Active Items Procurement Worksheet</div>
                        <div class="order-summary-wrapper">
                            <button class="btn btn-excel" style="padding:4px 12px; font-size:0.78rem; min-height:28px;" onclick="exportToExcel()">📈 Export Worksheet</button>
                            <button class="btn" style="background:var(--md-sys-color-surface-variant); font-size:0.78rem; padding:4px 12px; min-height:28px; color:var(--md-sys-color-text-secondary);" onclick="clearTransactions()">Clear Current Order</button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table id="transactionTable">
                            <thead>
                                <tr>
                                    <th style="width: 20%;">Code</th>
                                    <th style="width: 45%;">Description</th>
                                    <th style="width: 15%;" class="text-center">Qty</th>
                                    <th style="width: 15%;" class="text-right">Total</th>
                                    <th style="width: 5%;" class="text-center">X</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                            <tfoot>
                                <tr>
                                    <td colspan="3" class="text-right footer-metric-label">Total:</td>
                                    <td class="text-right footer-metric-val" id="footerTotalVal">0.00</td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td colspan="3" class="text-right footer-metric-label">VAT (5%):</td>
                                    <td class="text-right footer-metric-val" id="footerVatVal">0.00</td>
                                    <td></td>
                                </tr>
                                <tr class="grand-total-row">
                                    <td colspan="3" class="text-right footer-metric-label">Grand Total:</td>
                                    <td class="text-right footer-metric-val" id="footerGrandTotalVal">0.00</td>
                                    <td></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>

                <div id="entryTabPanel" class="tab-panel">
                    <div class="form-grid">
                        <div class="form-unit half-unit"><div class="form-group"><label>ID</label><input type="text" id="itemID"></div></div>
                        <div class="form-unit"><div class="form-group"><label>Code</label><input type="text" id="itemCode"></div></div>
                        <div class="form-unit barcode-unit"><div class="form-group"><label>Barcode</label><input type="text" id="barcode"></div></div>
                        <div class="form-unit half-unit"><div class="form-group"><label>Stock</label><input type="number" id="stock" placeholder="0"></div></div>
                        <div class="form-unit desc-unit"><div class="form-group"><label>Description</label><input type="text" id="description"></div></div>
                        <div class="form-unit half-unit"><div class="form-group"><label>Price</label><input type="number" id="price" step="0.01"></div></div>
                        <div class="form-unit half-unit"><div class="form-group"><label>RSP</label><input type="number" id="rsp" step="0.01"></div></div>
                        <div class="form-unit">
                            <div class="form-group">
                                <label>Status</label>
                                <select id="status"><option value="Active">Active</option><option value="Blocked">Blocked</option></select>
                            </div>
                        </div>
                        <div class="form-unit btn-unit">
                            <button class="btn btn-save" onclick="addItem()">Save Item</button>
                        </div>
                    </div>
                </div>

                <div id="calcTabPanel" class="tab-panel">
                    <div class="calc-grid">
                        <div class="calc-section calc-purchasing">
                            <label class="label" style="color:var(--purchasing-text); margin-bottom:8px;">Purchasing</label>
                            <div class="calc-row">
                                <div>
                                    <label class="label">Outer Size</label>
                                    <input type="number" id="calcOuterSize" min="1" step="1" placeholder="e.g. 144" style="background:rgba(255,255,255,0.8);">
                                </div>
                                <div>
                                    <label class="label">Outer Cost</label>
                                    <input type="number" id="calcOuterCost" min="0" step="0.01" placeholder="0.00" style="background:rgba(255,255,255,0.8);">
                                </div>
                                <div>
                                    <label class="label">Unit Cost</label>
                                    <input type="number" id="calcCost" min="0" step="0.01" value="20" style="background:rgba(255,255,255,0.8);">
                                </div>
                            </div>
                            <div>
                                <label class="label">Supplier Discount (%)</label>
                                <input type="number" id="calcCostDiscount" min="0" max="100" step="0.01" value="0" style="background:var(--discount); border-color:#fee2e2;">
                                <span id="calcNetCostLabel" class="net-cost">Net Unit Cost: 20.00</span>
                            </div>
                        </div>

                        <div class="calc-section calc-sales">
                            <label class="label" style="color:var(--sales-text); margin-bottom:8px;">Sales</label>
                            <div class="calc-row">
                                <div>
                                    <label class="label">Selling Price</label>
                                    <input type="number" id="calcPrice" min="0" step="0.01" value="30.77" class="main-result">
                                </div>
                                <div>
                                    <label class="label">Deduction (%)</label>
                                    <input type="number" id="calcDeduction" min="0" max="100" step="0.01" value="18">
                                </div>
                            </div>
                        </div>

                        <div class="calc-section calc-profit">
                            <label class="label" style="color:var(--profit-text); margin-bottom:8px;">Profitability</label>
                            <div>
                                <label class="label">Target Margin (%)</label>
                                <input type="number" id="calcMargin" min="0" max="100" step="0.01" value="35" class="margin-result">
                            </div>
                            <div id="calcProfitAmount" class="profit-amount">Profit per Unit: 0.00</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('flamingo_db_v3')) || [];
    let transactions = JSON.parse(localStorage.getItem('flamingo_trans_v3')) || [];

    const elements = {
        itemID: document.getElementById('itemID'),
        itemCode: document.getElementById('itemCode'),
        barcode: document.getElementById('barcode'),
        description: document.getElementById('description'),
        price: document.getElementById('price'),
        rsp: document.getElementById('rsp'),
        stock: document.getElementById('stock'),
        status: document.getElementById('status'),
        tableFilter: document.getElementById('tableFilter'),
        statusFilter: document.getElementById('statusFilter'),
        inventoryTbody: document.querySelector("#inventoryTable tbody"),
        transactionTbody: document.querySelector("#transactionTable tbody"),
        footerTotalVal: document.getElementById('footerTotalVal'),
        footerVatVal: document.getElementById('footerVatVal'),
        footerGrandTotalVal: document.getElementById('footerGrandTotalVal'),
        printArea: document.getElementById('printArea'),
        csvInput: document.getElementById('csvInput')
    };

    // Profit Calculator and Tab Configuration DOM Registries
    const calcEl = {
        outerSize: document.getElementById("calcOuterSize"),
        outerCost: document.getElementById("calcOuterCost"),
        cost: document.getElementById("calcCost"),
        costDiscount: document.getElementById("calcCostDiscount"),
        price: document.getElementById("calcPrice"),
        margin: document.getElementById("calcMargin"),
        deduction: document.getElementById("calcDeduction"),
        netLabel: document.getElementById("calcNetCostLabel"),
        profitLabel: document.getElementById("calcProfitAmount"),
        tabEntryBtn: document.getElementById("tabEntryBtn"),
        tabCalcBtn: document.getElementById("tabCalcBtn"),
        tabOrderBtn: document.getElementById("tabOrderBtn"),
        entryPanel: document.getElementById("entryTabPanel"),
        calcPanel: document.getElementById("calcTabPanel"),
        orderPanel: document.getElementById("orderTabPanel")
    };

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const blobCode = `
                const CACHE_NAME = 'flamingo-master-v1';
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => {
                    if (e.request.url.includes('cdn')) {
                        e.respondWith(caches.open(CACHE_NAME).then(cache => {
                            return cache.match(e.request).then(res => {
                                return res || fetch(e.request).then(netRes => {
                                    cache.put(e.request, netRes.clone());
                                    return netRes;
                                });
                            });
                        }));
                    }
                });
            `;
            const blob = new Blob([blobCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log('Offline Engine Primed'));
        });
    }

    window.onload = () => { 
        renderTable(); 
        renderTransactions(); 
        loadCalcData();
        updatePrice();
    };

    function sync() {
        localStorage.setItem('flamingo_db_v3', JSON.stringify(inventory));
        localStorage.setItem('flamingo_trans_v3', JSON.stringify(transactions));
        renderTable();
    }

    // Dynamic Tab Layout Controller Engine Matrix
    function switchWorkspaceTab(targetTab) {
        [calcEl.tabEntryBtn, calcEl.tabCalcBtn, calcEl.tabOrderBtn].forEach(btn => {
            if(btn) btn.classList.remove('active');
        });
        [calcEl.entryPanel, calcEl.calcPanel, calcEl.orderPanel].forEach(panel => {
            if(panel) panel.classList.remove('active');
        });

        if (targetTab === 'entry' && calcEl.tabEntryBtn && calcEl.entryPanel) {
            calcEl.tabEntryBtn.classList.add('active');
            calcEl.entryPanel.classList.add('active');
        } else if (targetTab === 'calc' && calcEl.tabCalcBtn && calcEl.calcPanel) {
            calcEl.tabCalcBtn.classList.add('active');
            calcEl.calcPanel.classList.add('active');
        } else if (targetTab === 'order' && calcEl.tabOrderBtn && calcEl.orderPanel) {
            calcEl.tabOrderBtn.classList.add('active');
            calcEl.orderPanel.classList.add('active');
        }
    }

    function editItem(barcode) {
        const item = inventory.find(i => i.barcode === barcode);
        if (item) {
            switchWorkspaceTab('entry');
            
            elements.itemID.value = item.id;
            elements.itemCode.value = item.code;
            elements.barcode.value = item.barcode;
            elements.description.value = item.desc;
            elements.price.value = item.price;
            elements.rsp.value = item.rsp;
            elements.stock.value = item.stock;
            elements.status.value = item.status;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function addItem() {
        const codeVal = elements.itemCode.value.toUpperCase().trim();
        const barcodeVal = elements.barcode.value.trim();
        
        if (!codeVal || !barcodeVal) return alert("Required: Code & Barcode");

        const item = {
            uniqueRef: Date.now(),
            id: elements.itemID.value.trim(),
            code: codeVal,
            barcode: barcodeVal,
            desc: elements.description.value.trim(),
            price: elements.price.value || "0.00",
            rsp: elements.rsp.value || "0.00",
            stock: elements.stock.value || "0",
            status: elements.status.value
        };

        inventory = inventory.filter(i => i.barcode !== item.barcode);
        inventory.push(item);
        sync();
        clearEntryForm();
        renderTransactions(); 
    }

    function clearEntryForm() {
        ['itemID', 'itemCode', 'barcode', 'description', 'price', 'rsp', 'stock'].forEach(id => {
            if(elements[id]) elements[id].value = "";
        });
        if(elements.status) elements.status.value = "Active";
    }

    function delItem(ref) { 
        if(confirm("Delete item?")) { 
            inventory = inventory.filter(i => i.uniqueRef !== ref); 
            sync(); 
            renderTransactions(); 
        } 
    }

    function renderTable() {
        const filterInput = elements.tableFilter.value.toLowerCase().trim();
        const searchTokens = filterInput.split(/\s+/).filter(t => t.length > 0);
        const stat = elements.statusFilter.value;
        
        let htmlBuffer = '';

        const filtered = inventory.filter(i => {
            if (stat !== "All" && i.status !== stat) return false;
            if (searchTokens.length === 0) return true;
            const itemString = `${i.code} ${i.barcode} ${i.desc} ${i.id}`.toLowerCase();
            return searchTokens.every(token => itemString.includes(token));
        });

        filtered.forEach(i => {
            const dotClass = i.status === 'Active' ? 'dot-active' : 'dot-blocked';
            htmlBuffer += `
                <tr>
                    <td>${i.id}</td>
                    <td>
                        <div class="code-cell">
                            <span style="font-weight:700; font-family:monospace;">${i.code}</span>
                            <button class="btn btn-plus" title="Add to Order" onclick="addTrans('${i.code}')">➕</button>
                        </div>
                    </td>
                    <td class="wrap-cell">
                        <span class="status-dot ${dotClass}" title="${i.status}"></span>${i.desc}
                    </td>
                    <td>${i.barcode}</td>
                    <td style="font-family:monospace;">${Number(i.price).toFixed(2)} / <span style="color:var(--md-sys-color-text-secondary);">${Number(i.rsp).toFixed(2)}</span></td>
                    <td><strong>${i.stock}</strong></td>
                    <td class="action-cell">
                        <button class="btn btn-print" title="Print Label" onclick="printBarcodeLabel('${i.barcode}')">🖨️</button>
                        <button class="btn btn-edit" title="Edit Item" onclick="editItem('${i.barcode}')">✏️</button>
                        <button class="btn btn-delete" title="Delete Item" onclick="delItem(${i.uniqueRef})">🗑️</button>
                    </td>
                </tr>`;
        });
        
        elements.inventoryTbody.innerHTML = htmlBuffer;
    }

    function printBarcodeLabel(barcodeStr) {
        const item = inventory.find(i => i.barcode === barcodeStr);
        if(!item) return alert("Item metadata missing!");
        
        elements.printArea.innerHTML = `
            <div class="print-label-card">
                <div class="p-top-spacer"></div>
                <div class="p-code">${item.code}</div>
                <div class="p-bar-wrapper">
                    <svg id="zebraBarcodeTarget"></svg>
                </div>
                <div class="p-desc">${item.desc}</div>
            </div>
        `;
        
        const len = String(item.barcode).length;
        const strokeWidth = len > 14 ? 1.5 : (len < 8 ? 3 : 2);

        JsBarcode("#zebraBarcodeTarget", item.barcode, {
            format: "CODE128",
            width: strokeWidth,
            height: 42,         
            displayValue: true,
            fontSize: 7,                          
            font: "'Courier New', Courier, monospace", 
            fontOptions: "bold",
            background: "#fff",
            lineColor: "#000",
            margin: 0
        });

        setTimeout(() => { window.print(); }, 50);
    }

    function addTrans(code) {
        const item = inventory.find(i => i.code === code);
        if (!item) return;
        transactions.push({ code: item.code, desc: item.desc, qty: 12, price: item.price, ref: Date.now() });
        syncTransactions();
        switchWorkspaceTab('order');
    }

    function updateQty(ref, val) {
        const t = transactions.find(item => item.ref === ref);
        if (t) { 
            t.qty = val; 
            localStorage.setItem('flamingo_trans_v3', JSON.stringify(transactions)); 
            calculateGrandTotal();
            const rowTotalSpan = document.getElementById(`row-total-${ref}`);
            if(rowTotalSpan) {
                const currentItem = inventory.find(i => i.code === t.code);
                const unitPrice = currentItem ? Number(currentItem.price) : (Number(t.price) || 0);
                rowTotalSpan.innerText = (unitPrice * Number(val)).toFixed(2);
            }
        }
    }

    function syncTransactions() {
        localStorage.setItem('flamingo_trans_v3', JSON.stringify(transactions));
        renderTransactions();
    }

    function renderTransactions() {
        elements.transactionTbody.innerHTML = transactions.map(t => {
            const currentItem = inventory.find(i => i.code === t.code);
            const unitPrice = currentItem ? Number(currentItem.price) : (Number(t.price) || 0);
            const lineTotal = unitPrice * Number(t.qty);
            
            return `
                <tr>
                    <td style="font-weight:700; font-family:monospace;">${t.code}</td>
                    <td class="wrap-cell">${t.desc}</td>
                    <td class="text-center"><input type="number" class="qty-input" value="${t.qty}" min="1" oninput="updateQty(${t.ref}, this.value)"></td>
                    <td class="text-right" style="font-weight:700; color:var(--md-sys-color-text); font-family:monospace;"><span id="row-total-${t.ref}">${lineTotal.toFixed(2)}</span></td>
                    <td class="text-center"><button class="btn btn-delete" style="padding: 2px 6px; min-height:22px;" onclick="remTrans(${t.ref})">×</button></td>
                </tr>`;
        }).join('');
        
        calculateGrandTotal();
    }

    function calculateGrandTotal() {
        let subtotal = 0;
        transactions.forEach(t => {
            const currentItem = inventory.find(i => i.code === t.code);
            const unitPrice = currentItem ? Number(currentItem.price) : (Number(t.price) || 0);
            subtotal += unitPrice * (Number(t.qty) || 0);
        });
        
        const vatTotal = subtotal * 0.05;
        const netGrandTotal = subtotal + vatTotal;

        if (elements.footerTotalVal) elements.footerTotalVal.innerText = subtotal.toFixed(2);
        if (elements.footerVatVal) elements.footerVatVal.innerText = vatTotal.toFixed(2);
        if (elements.footerGrandTotalVal) elements.footerGrandTotalVal.innerText = netGrandTotal.toFixed(2);
    }

    function remTrans(ref) { transactions = transactions.filter(t => t.ref !== ref); syncTransactions(); }
    function clearTransactions() { transactions = []; syncTransactions(); }

    function exportInventoryCSV() {
        if (!inventory.length) return alert("Inventory is empty!");
        let csv = "ID,Code,Barcode,Description,Price,RSP,Stock,Status\n";
        inventory.forEach(i => {
            csv += `"${i.id}","${i.code}","${i.barcode}","${i.desc}","${i.price}","${i.rsp}","${i.stock}","${i.status}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Flamingo_Inventory_Backup_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }

    function exportToExcel() {
        if (!transactions.length) return alert("No items found in the Active Order List.");
        
        let filename = prompt("Enter Export Filename:", "Flamingo_Order");
        if (!filename) return; 

        let csvContent = "\uFEFF"; 
        csvContent += "Code,Description,Quantity\n"; 

        let sortedTransactions = [...transactions].sort((a, b) => Number(b.qty) - Number(a.qty));

        sortedTransactions.forEach(t => {
            const cleanedDescription = t.desc.replace(/"/g, '""');
            csvContent += `"${t.code}","${cleanedDescription}",${t.qty}\n`; 
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${filename.trim().replace(/[\/\?<>\\:\*\|"]/g, '_')}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function parseCSVLine(text) {
        let p = '', r = [];
        let q = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"') { q = !q; }
            else if (c === ',' && !q) { r.push(p); p = ''; }
            else { p += c; }
        }
        r.push(p);
        return r;
    }

    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split(/\r?\n/);
            if(lines.length <= 1) return;

            let timestampBase = Date.now();
            let newItems = [];

            for (let i = 1; i < lines.length; i++) {
                const lineClean = lines[i].trim();
                if (!lineClean) continue;
                
                const c = parseCSVLine(lineClean);
                if (c.length >= 6) {
                    newItems.push({
                        uniqueRef: timestampBase + i,
                        id: (c[0] || "").trim(), 
                        code: (c[1] || "").trim().toUpperCase(),
                        barcode: (c[2] || "").trim(), 
                        desc: (c[3] || "").trim(),
                        price: (c[4] || "").trim() || "0.00", 
                        rsp: (c[5] || "").trim() || "0.00",
                        stock: (c[6] || "").trim() || "0", 
                        status: (c[7] || "").trim() || "Active"
                    });
                }
            }

            if(newItems.length > 0) {
                const barcodeMap = new Set(newItems.map(item => item.barcode));
                inventory = inventory.filter(i => !barcodeMap.has(i.barcode)).concat(newItems);
                sync();
                alert(`Successfully imported ${newItems.length} items!`);
            }
            if(elements.csvInput) elements.csvInput.value = "";
        };
        reader.readAsText(file);
    }

    function clearInventory() { if(confirm("Delete ALL?")) { inventory = []; sync(); renderTransactions(); } }

    // ==========================================
    // PROFIT CALCULATOR ENGINE ALGORITHMS
    // ==========================================
    const num = value => parseFloat(value) || 0;

    function saveCalcData() {
        localStorage.setItem("flamingo-calculator",
            JSON.stringify({
                outerSize: calcEl.outerSize.value,
                outerCost: calcEl.outerCost.value,
                cost: calcEl.cost.value,
                costDiscount: calcEl.costDiscount.value,
                price: calcEl.price.value,
                margin: calcEl.margin.value,
                deduction: calcEl.deduction.value
            })
        );
    }

    function loadCalcData() {
        const saved = JSON.parse(localStorage.getItem("flamingo-calculator") || "{}");
        Object.keys(saved).forEach(key => {
            if(calcEl[key]) {
                calcEl[key].value = saved[key];
            }
        });
    }

    function getNetCost() {
        return num(calcEl.cost.value) * (1 - num(calcEl.costDiscount.value) / 100);
    }

    function updateNetLabel(cost) {
        if(calcEl.netLabel) calcEl.netLabel.textContent = `Net Unit Cost: ${cost.toFixed(2)}`;
    }

    function updateProfitDisplay(price, deduction, cost) {
        const profit = price - (price * deduction) - cost;
        if(calcEl.profitLabel) calcEl.profitLabel.textContent = `Profit per Unit: ${profit.toFixed(2)}`;
    }

    function updatePrice() {
        const cost = getNetCost();
        const margin = num(calcEl.margin.value) / 100;
        const deduction = num(calcEl.deduction.value) / 100;

        updateNetLabel(cost);
        const divisor = 1 - deduction - margin;

        if(divisor <= 0){
            if(calcEl.price) calcEl.price.value = "";
            if(calcEl.profitLabel) calcEl.profitLabel.textContent = "Invalid Margin/Deduction";
            return;
        }

        const price = cost / divisor;
        if(calcEl.price) calcEl.price.value = price.toFixed(2);
        updateProfitDisplay(price, deduction, cost);
        saveCalcData();
    }

    function updateMargin() {
        const price = num(calcEl.price.value);
        const cost = getNetCost();
        const deduction = num(calcEl.deduction.value) / 100;

        updateNetLabel(cost);
        if(price <= 0){
            if(calcEl.margin) calcEl.margin.value = 0;
            return;
        }

        const margin = ((price - (price * deduction) - cost) / price) * 100;
        if(calcEl.margin) calcEl.margin.value = margin.toFixed(2);
        updateProfitDisplay(price, deduction, cost);
        saveCalcData();
    }

    // Outer Size / Outer Cost Calculation Link Engine
    function runOuterCalculation() {
        const oSize = num(calcEl.outerSize.value);
        const oCost = num(calcEl.outerCost.value);
        
        if(oSize > 0 && calcEl.cost) {
            calcEl.cost.value = (oCost / oSize).toFixed(2);
        }
        updatePrice();
    }

    // Calculator Event Binding Setup Matrix
    if(calcEl.outerSize) calcEl.outerSize.addEventListener("input", runOuterCalculation);
    if(calcEl.outerCost) calcEl.outerCost.addEventListener("input", runOuterCalculation);

    if(calcEl.cost) {
        calcEl.cost.addEventListener("input", () => {
            if(calcEl.outerSize) calcEl.outerSize.value = "";
            if(calcEl.outerCost) calcEl.outerCost.value = "";
            updatePrice();
        });
    }

    ["costDiscount", "margin", "deduction"].forEach(id => {
        if(calcEl[id]) calcEl[id].addEventListener("input", updatePrice);
    });

    if(calcEl.price) calcEl.price.addEventListener("input", updateMargin);
</script>
</body>
</html>
